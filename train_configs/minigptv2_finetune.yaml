  #  sample_ratio: 100
  MSD_tumor_detection:
    batch_size: 8
    vis_processor:
      train:
        name: "blip2_image_train"
        image_size: 448
    text_processor:
      train:
        name: "blip_caption"
    sample_ratio: 100
  #MSD_pancreas_detection:
