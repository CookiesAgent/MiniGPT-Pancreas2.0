model:
  arch: minigpt_v2
  low_resource: True
  model_type: pretrain
  max_txt_len: 512
  image_size: 448
  end_sym: "</s>"
  llama_model: "/content/Llama-2-7b-chat-hf"
  ckpt: "/content/checkpoint_stage3.pth"
  use_grad_checkpoint: True
  chat_template: True
  lora_r: 64
  lora_alpha: 16

datasets:
